<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frame52 Photography</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0b0b0b;
  color: white;
  scroll-behavior: smooth;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#loader h1 {
  animation: fade 1.5s infinite alternate;
}

@keyframes fade {
  from {opacity: 0.3;}
  to {opacity: 1;}
}

/* HERO */
header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), black),
              url('https://source.unsplash.com/1600x900/?cinematic,wedding') center/cover;
  text-align: center;
}

header h1 {
  font-size: 50px;
}

nav {
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 15px;
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
}

section {
  padding: 80px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* FORM */
form {
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, textarea {
  padding: 12px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 12px;
  background: #ff4c4c;
  color: white;
  border: none;
  cursor: pointer;
}

/* WHATSAPP BUTTON */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
  color: white;
}

/* FOOTER */
footer {
  padding: 20px;
  background: black;
}
</style>
</head>

<body>

<div id="loader"><h1>Frame52</h1></div>

<header>
  <h1>Frame52 Photography</h1>
  <p>Capturing moments that last forever</p>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#gallery">Gallery</a>
  <a href="#booking">Book</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <h2>About</h2>
  <p>Luxury wedding & event photography with cinematic storytelling.</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://source.unsplash.com/400x300/?wedding" />
    <img src="https://source.unsplash.com/400x300/?couple" />
    <img src="https://source.unsplash.com/400x300/?event" />
    <img src="https://source.unsplash.com/400x300/?portrait" />
  </div>
</section>

<section id="booking">
  <h2>Book a Shoot</h2>
  <form action="https://formsubmit.co/yourframe52@gmail.com" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="text" name="event" placeholder="Event Type" required>
    <textarea name="message" placeholder="Details"></textarea>
    <button type="submit">Submit</button>
  </form>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: yourframe52@gmail.com</p>
  <p>Phone: 7416903124</p>
</section>

<footer>
  <p>© 2026 Frame52</p>
</footer>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/917416903124" target="_blank">💬</a>

<script>
// LOADER
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};

// SCROLL ANIMATION
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    if (sec.getBoundingClientRect().top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});
</script>

</body>
  </html>
